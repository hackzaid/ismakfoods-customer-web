name: Deploy customer web to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: customer-web-cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    name: Build standalone app and deploy over SSH
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.ismakfoods.com/api/v1' }}
      NEXT_PUBLIC_API_ORIGIN: ${{ vars.NEXT_PUBLIC_API_ORIGIN || 'https://api.ismakfoods.com' }}
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
      CPANEL_SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
      CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
      CPANEL_SSH_PRIVATE_KEY_B64: ${{ secrets.CPANEL_SSH_PRIVATE_KEY_B64 }}
      CPANEL_SSH_TARGET_DIR: ${{ secrets.CPANEL_SSH_TARGET_DIR }}
      CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH || '/home/afripnxq/demo.ismakfoods.com/standalone' }}
      DEPLOY_VERIFY_URL: ${{ vars.DEPLOY_VERIFY_URL || 'https://demo.ismakfoods.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone app
        run: npm run build

      - name: Package deployment artifact
        run: |
          set -euo pipefail

          rm -rf deploy customer-web-deploy.tar.gz
          mkdir -p deploy/standalone/.next deploy/standalone/public

          cp -R .next/standalone/. deploy/standalone/
          rm -rf deploy/standalone/node_modules
          cp package-lock.json deploy/standalone/package-lock.json
          cp -R .next/static deploy/standalone/.next/static

          if [ -d public ]; then
            cp -R public/. deploy/standalone/public/
          fi

          cat > deploy/standalone/.env.production <<EOF
          NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
          NEXT_PUBLIC_API_ORIGIN=${NEXT_PUBLIC_API_ORIGIN}
          EOF

          cat > deploy/standalone/public/__deploy.json <<EOF
          {"sha":"$GITHUB_SHA","run_id":"$GITHUB_RUN_ID","run_attempt":"$GITHUB_RUN_ATTEMPT","built_at":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"}
          EOF

          find deploy/standalone/.next/static -type f -printf '%P\n' | sort > deploy/standalone/.deploy-static-files

          cat > deploy/server.js <<'EOF'
          require('./standalone/server.js');
          EOF

          cp deploy/standalone/public/__deploy.json deploy/__deploy.json
          tar -czf customer-web-deploy.tar.gz -C deploy .

      - name: Configure SSH key
        run: |
          set -euo pipefail

          : "${CPANEL_SSH_HOST:?Missing CPANEL_SSH_HOST secret}"
          : "${CPANEL_SSH_USER:?Missing CPANEL_SSH_USER secret}"
          mkdir -p ~/.ssh

          if [ -n "${CPANEL_SSH_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "$CPANEL_SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/cpanel_key
          elif [ -n "${CPANEL_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$CPANEL_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/cpanel_key
          else
            echo "Missing CPANEL_SSH_PRIVATE_KEY_B64 or CPANEL_SSH_PRIVATE_KEY secret." >&2
            exit 1
          fi

          chmod 600 ~/.ssh/cpanel_key
          ssh-keygen -y -f ~/.ssh/cpanel_key > /dev/null
          ssh-keyscan -p "${CPANEL_SSH_PORT:-22}" "$CPANEL_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          set -euo pipefail

          deploy_path="${CPANEL_DEPLOY_PATH%/}"
          target_dir="${CPANEL_SSH_TARGET_DIR:-${deploy_path%/standalone}}"

          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            "mkdir -p '$target_dir' && test -w '$target_dir'"

      - name: Upload artifact
        run: |
          set -euo pipefail

          deploy_path="${CPANEL_DEPLOY_PATH%/}"
          target_dir="${CPANEL_SSH_TARGET_DIR:-${deploy_path%/standalone}}"

          scp -i ~/.ssh/cpanel_key -P "${CPANEL_SSH_PORT:-22}" customer-web-deploy.tar.gz \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST:$target_dir/customer-web-deploy.tar.gz"

      - name: Extract and restart Node app
        run: |
          set -euo pipefail

          deploy_path="${CPANEL_DEPLOY_PATH%/}"
          target_dir="${CPANEL_SSH_TARGET_DIR:-${deploy_path%/standalone}}"

          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            'bash -s' -- "$target_dir" "$GITHUB_SHA" <<'REMOTE'
          set -euo pipefail

          target_dir="$1"
          github_sha="$2"

          cd "$target_dir"

          rm -rf .next .env.production DEPLOYMENT.txt package.json package-lock.json public server.js .deploy-static-files __deploy.json
          if [ -e node_modules ] && [ ! -L node_modules ]; then
            rm -rf node_modules
          fi

          mkdir -p standalone
          cd standalone
          if [ -e node_modules ] && [ ! -L node_modules ]; then
            rm -rf node_modules
          fi
          find . -mindepth 1 -maxdepth 1 ! -name 'tmp' ! -name 'node_modules' -exec rm -rf {} +

          cd ..
          tar -xzf customer-web-deploy.tar.gz
          rm -f customer-web-deploy.tar.gz

          chmod -R u+rwX,go+rX .next 2>/dev/null || true
          chmod -R u+rwX,go+rX public 2>/dev/null || true
          chmod -R u+rwX,go+rX standalone/.next
          chmod -R u+rwX,go+rX standalone/public
          chmod u+rw,go+r __deploy.json standalone/public/__deploy.json

          cd standalone
          if [ -L node_modules ] && command -v npm >/dev/null 2>&1; then
            npm ci --omit=dev --no-audit --no-fund
          elif [ -L node_modules ]; then
            echo "::warning::CloudLinux node_modules symlink exists, but npm is not available in this SSH shell. Use cPanel's NPM Install action when package dependencies change."
          else
            echo "::warning::CloudLinux node_modules symlink is missing. Create the Node.js app with application root '$target_dir/standalone' and run NPM Install once."
          fi

          printf 'Ismak Foods customer web deployed from %s at %s\n' "$github_sha" "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > DEPLOYMENT.txt
          mkdir -p tmp
          touch tmp/restart.txt

          cd ..
          mkdir -p tmp
          touch tmp/restart.txt

          echo "Standalone deployment target contents:"
          cd standalone
          ls -ld node_modules 2>/dev/null || true
          find . -maxdepth 2 -mindepth 1 -print | sort | sed 's#^\./##' | head -80
          echo "Parent deployment target contents:"
          cd ..
          find . -maxdepth 1 -mindepth 1 -print | sort | sed 's#^\./##' | head -40
          REMOTE

      - name: Verify uploaded files on cPanel
        run: |
          set -euo pipefail

          deploy_path="${CPANEL_DEPLOY_PATH%/}"
          target_dir="${CPANEL_SSH_TARGET_DIR:-${deploy_path%/standalone}}"

          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            'bash -s' -- "$target_dir" "$GITHUB_SHA" <<'REMOTE'
          set -euo pipefail

          target_dir="$1"
          expected_sha="$2"
          cd "$target_dir/standalone"

          if [ ! -s .deploy-static-files ]; then
            echo 'Missing deployed static manifest standalone/.deploy-static-files.' >&2
            exit 1
          fi

          if ! grep -q "$expected_sha" public/__deploy.json; then
            echo "standalone/public/__deploy.json does not contain expected sha $expected_sha" >&2
            exit 1
          fi

          if ! grep -q "$expected_sha" ../__deploy.json; then
            echo "parent __deploy.json does not contain expected sha $expected_sha" >&2
            exit 1
          fi

          missing=0
          while IFS= read -r file; do
            if [ ! -s ".next/static/$file" ]; then
              echo "Missing or empty static file: standalone/.next/static/$file" >&2
              missing=1
            fi
          done < .deploy-static-files

          exit "$missing"
          REMOTE

      - name: Verify public HTTPS assets
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import time
          from pathlib import Path
          import urllib.error
          import urllib.request

          base_url = os.environ["DEPLOY_VERIFY_URL"].rstrip("/")
          expected_sha = os.environ["GITHUB_SHA"]
          static_manifest = {
              f"/_next/static/{line.strip()}"
              for line in Path("deploy/standalone/.deploy-static-files").read_text(encoding="utf-8").splitlines()
              if line.strip()
          }

          def request(url: str, method: str = "GET") -> tuple[int, str]:
              request = urllib.request.Request(url, method=method, headers={"User-Agent": "github-actions-deploy-smoke"})
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.status, response.headers.get("content-type", "")

          errors: list[str] = []
          for attempt in range(1, 5):
              errors = []
              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(f"{base_url}/__deploy.json", headers={"User-Agent": "github-actions-deploy-smoke"}),
                      timeout=30,
                  ) as response:
                      deploy_marker = json.loads(response.read().decode("utf-8", errors="replace"))
                  if deploy_marker.get("sha") != expected_sha:
                      errors.append(
                          f"Public deploy marker is stale or from another root. "
                          f"expected sha {expected_sha}, got {deploy_marker.get('sha')!r}."
                      )
              except urllib.error.HTTPError as exc:
                  errors.append(f"GET {base_url}/__deploy.json returned {exc.code}")
              except Exception as exc:
                  errors.append(f"GET {base_url}/__deploy.json failed: {exc}")

              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(f"{base_url}/", headers={"User-Agent": "github-actions-deploy-smoke"}),
                      timeout=30,
                  ) as response:
                      html = response.read().decode("utf-8", errors="replace")
              except Exception as exc:
                  errors.append(f"GET {base_url}/ failed: {exc}")
                  html = ""

              asset_paths = sorted(
                  {
                      match.rstrip("\\")
                      for match in re.findall(r"/_next/static/[^\"'<>\s\\]+", html)
                  }
              )

              if not asset_paths and not errors:
                  errors.append("No /_next/static assets found in deployed HTML.")

              stale_assets = [path for path in asset_paths if path not in static_manifest]
              if stale_assets:
                  errors.append(
                      "Deployed HTML references static assets that are not in the current build. "
                      "The cPanel Node app is likely stale, not restarted, or pointed at a different application root."
                  )
                  errors.extend(f"stale asset: {path}" for path in stale_assets[:10])

              for path in asset_paths:
                  url = f"{base_url}{path}"
                  try:
                      status, content_type = request(url, "HEAD")
                  except urllib.error.HTTPError as exc:
                      errors.append(f"HEAD {url} returned {exc.code}")
                      continue
                  except Exception as exc:
                      errors.append(f"HEAD {url} failed: {exc}")
                      continue

                  if status >= 400:
                      errors.append(f"HEAD {url} returned {status}")
                  if path.endswith(".css") and "text/css" not in content_type:
                      errors.append(f"HEAD {url} returned unexpected content-type {content_type!r}")
                  if path.endswith(".js") and "javascript" not in content_type:
                      errors.append(f"HEAD {url} returned unexpected content-type {content_type!r}")

              if not errors:
                  print(f"Verified public deploy marker and {len(asset_paths)} Next.js static assets from {base_url}.")
                  sys.exit(0)

              print(f"Deploy smoke attempt {attempt} failed:")
              for error in errors[:20]:
                  print(f"- {error}")
              if attempt < 4:
                  time.sleep(10)

          sys.exit(1)
          PY
