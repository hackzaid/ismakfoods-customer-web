name: Deploy customer web to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build standalone app and deploy over SSH
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.ismakfoods.com/api/v1' }}
      NEXT_PUBLIC_API_ORIGIN: ${{ vars.NEXT_PUBLIC_API_ORIGIN || 'https://api.ismakfoods.com' }}
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
      CPANEL_SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
      CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
      CPANEL_SSH_PRIVATE_KEY_B64: ${{ secrets.CPANEL_SSH_PRIVATE_KEY_B64 }}
      CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH || '/home/afripnxq/demo.ismakfoods.com/standalone' }}
      CPANEL_PUBLIC_ROOT: ${{ secrets.CPANEL_PUBLIC_ROOT }}
      DEPLOY_VERIFY_URL: ${{ vars.DEPLOY_VERIFY_URL || 'https://demo.ismakfoods.com' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone app
        run: npm run build

      - name: Prepare cPanel deploy artifact
        run: |
          rm -rf deploy
          mkdir -p deploy/.next deploy/public
          cp -R .next/standalone/. deploy/
          rm -rf deploy/node_modules
          cp -R .next/static deploy/.next/static
          cp package-lock.json deploy/package-lock.json
          if [ -d public ]; then
            cp -R public deploy/public
          fi
          cat > deploy/public/__deploy.json <<EOF
          {"sha":"$GITHUB_SHA","run_id":"$GITHUB_RUN_ID","run_attempt":"$GITHUB_RUN_ATTEMPT","built_at":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"}
          EOF
          find deploy/.next/static -type f -printf '%P\n' | sort > deploy/.deploy-static-files

      - name: Configure SSH key
        run: |
          : "${CPANEL_SSH_HOST:?Missing CPANEL_SSH_HOST secret}"
          : "${CPANEL_SSH_USER:?Missing CPANEL_SSH_USER secret}"
          : "${CPANEL_DEPLOY_PATH:?Missing CPANEL_DEPLOY_PATH secret}"
          mkdir -p ~/.ssh

          if [ -n "$CPANEL_SSH_PRIVATE_KEY_B64" ]; then
            printf '%s' "$CPANEL_SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/cpanel_key
          elif [ -n "$CPANEL_SSH_PRIVATE_KEY" ]; then
            printf '%s\n' "$CPANEL_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/cpanel_key
          else
            echo "Missing CPANEL_SSH_PRIVATE_KEY_B64 or CPANEL_SSH_PRIVATE_KEY secret." >&2
            exit 1
          fi

          chmod 600 ~/.ssh/cpanel_key
          ssh-keygen -y -f ~/.ssh/cpanel_key > /dev/null
          ssh-keyscan -p "${CPANEL_SSH_PORT:-22}" "$CPANEL_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote application root exists
        run: |
          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            "mkdir -p '$CPANEL_DEPLOY_PATH'"

      - name: Deploy standalone app to cPanel
        run: |
          rsync -az --delete \
            --checksum \
            --exclude='.htaccess' \
            --exclude='tmp/' \
            --exclude='logs/' \
            --exclude='nodevenv/' \
            --exclude='node_modules' \
            --exclude='.well-known/' \
            -e "ssh -i ~/.ssh/cpanel_key -p ${CPANEL_SSH_PORT:-22}" \
            deploy/ "$CPANEL_SSH_USER@$CPANEL_SSH_HOST:$CPANEL_DEPLOY_PATH/"

      - name: Mirror Next static assets to public root
        run: |
          public_root="${CPANEL_PUBLIC_ROOT:-$(dirname "$CPANEL_DEPLOY_PATH")}"

          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            "mkdir -p '$public_root/.next/static'"

          rsync -az --delete \
            --checksum \
            -e "ssh -i ~/.ssh/cpanel_key -p ${CPANEL_SSH_PORT:-22}" \
            deploy/.next/static/ "$CPANEL_SSH_USER@$CPANEL_SSH_HOST:$public_root/.next/static/"

          rsync -az \
            --checksum \
            -e "ssh -i ~/.ssh/cpanel_key -p ${CPANEL_SSH_PORT:-22}" \
            deploy/public/__deploy.json "$CPANEL_SSH_USER@$CPANEL_SSH_HOST:$public_root/__deploy.json"

          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            'bash -s' -- "$CPANEL_DEPLOY_PATH" "$public_root" <<'REMOTE'
          set -e

          CPANEL_DEPLOY_PATH="$1"
          CPANEL_PUBLIC_ROOT="$2"

          chmod -R u+rwX,go+rX "$CPANEL_DEPLOY_PATH/.next"
          chmod -R u+rwX,go+rX "$CPANEL_PUBLIC_ROOT/.next"
          if [ -d "$CPANEL_DEPLOY_PATH/public" ]; then
            chmod -R u+rwX,go+rX "$CPANEL_DEPLOY_PATH/public"
          fi
          if [ -f "$CPANEL_PUBLIC_ROOT/__deploy.json" ]; then
            chmod u+rw,go+r "$CPANEL_PUBLIC_ROOT/__deploy.json"
          fi
          REMOTE

      - name: Verify uploaded static files on cPanel
        run: |
          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            'bash -s' -- "$CPANEL_DEPLOY_PATH" "${CPANEL_PUBLIC_ROOT:-}" <<'REMOTE'
          set -e

          CPANEL_DEPLOY_PATH="$1"
          CPANEL_PUBLIC_ROOT="${2:-$(dirname "$CPANEL_DEPLOY_PATH")}"
          cd "$CPANEL_DEPLOY_PATH"

          if [ ! -s .deploy-static-files ]; then
            echo 'Missing deployed static manifest .deploy-static-files.' >&2
            exit 1
          fi

          missing=0
          while IFS= read -r file; do
            if [ ! -s ".next/static/$file" ]; then
              echo "Missing or empty static file: .next/static/$file" >&2
              missing=1
            fi
            if [ ! -s "$CPANEL_PUBLIC_ROOT/.next/static/$file" ]; then
              echo "Missing or empty public static file: $CPANEL_PUBLIC_ROOT/.next/static/$file" >&2
              missing=1
            fi
          done < .deploy-static-files

          exit "$missing"
          REMOTE

      - name: Install dependencies when CloudLinux symlink exists
        run: |
          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_SSH_PORT:-22}" \
            "$CPANEL_SSH_USER@$CPANEL_SSH_HOST" \
            'bash -s' -- "$CPANEL_DEPLOY_PATH" <<'REMOTE'
          set -e

          CPANEL_DEPLOY_PATH="$1"
          cd "$CPANEL_DEPLOY_PATH"

          if [ -d node_modules ] && [ ! -L node_modules ]; then
            echo 'Removing real node_modules directory left by a previous deploy.'
            rm -rf node_modules
          fi

          if [ ! -L node_modules ]; then
            echo 'CloudLinux node_modules symlink is missing. Files were deployed, but dependencies were not installed. Save the Node.js app in cPanel and click Run NPM Install once.'
            mkdir -p tmp
            touch tmp/restart.txt
            exit 0
          fi

          if ! command -v npm >/dev/null 2>&1; then
            app_relative="${CPANEL_DEPLOY_PATH#$HOME/}"
            for activate in "$HOME/nodevenv/$app_relative/"*/bin/activate "$HOME/nodevenv/$app_relative/bin/activate"; do
              if [ -f "$activate" ]; then
                # CloudLinux exposes npm through the Node.js Selector virtualenv.
                . "$activate"
                break
              fi
            done
          fi

          if ! command -v npm >/dev/null 2>&1; then
            echo 'npm is not available in this SSH shell. Files were deployed; use cPanel Run NPM Install for dependency changes.'
            mkdir -p tmp
            touch tmp/restart.txt
            exit 0
          fi

          npm install --omit=dev --no-audit --no-fund
          mkdir -p tmp
          touch tmp/restart.txt
          REMOTE

      - name: Verify public HTTPS assets
        run: |
          python3 - <<'PY'
          import os
          import json
          import re
          import sys
          import time
          from pathlib import Path
          import urllib.error
          import urllib.request

          base_url = os.environ["DEPLOY_VERIFY_URL"].rstrip("/")
          expected_sha = os.environ["GITHUB_SHA"]
          static_manifest = {
              f"/_next/static/{line.strip()}"
              for line in Path("deploy/.deploy-static-files").read_text(encoding="utf-8").splitlines()
              if line.strip()
          }

          def request(url: str, method: str = "GET") -> tuple[int, str]:
              request = urllib.request.Request(url, method=method, headers={"User-Agent": "github-actions-deploy-smoke"})
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.status, response.headers.get("content-type", "")

          errors: list[str] = []
          for attempt in range(1, 5):
              errors = []
              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(f"{base_url}/__deploy.json", headers={"User-Agent": "github-actions-deploy-smoke"}),
                      timeout=30,
                  ) as response:
                      deploy_marker = json.loads(response.read().decode("utf-8", errors="replace"))
                  if deploy_marker.get("sha") != expected_sha:
                      errors.append(
                          f"Public deploy marker is stale or from another root. "
                          f"expected sha {expected_sha}, got {deploy_marker.get('sha')!r}."
                      )
              except urllib.error.HTTPError as exc:
                  errors.append(f"GET {base_url}/__deploy.json returned {exc.code}")
              except Exception as exc:
                  errors.append(f"GET {base_url}/__deploy.json failed: {exc}")

              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(f"{base_url}/", headers={"User-Agent": "github-actions-deploy-smoke"}),
                      timeout=30,
                  ) as response:
                      html = response.read().decode("utf-8", errors="replace")
              except Exception as exc:
                  errors.append(f"GET {base_url}/ failed: {exc}")
                  html = ""

              asset_paths = sorted(
                  {
                      match.rstrip("\\")
                      for match in re.findall(r"/_next/static/[^\"'<>\s\\]+", html)
                  }
              )

              if not asset_paths and not errors:
                  errors.append("No /_next/static assets found in deployed HTML.")

              stale_assets = [path for path in asset_paths if path not in static_manifest]
              if stale_assets:
                  errors.append(
                      "Deployed HTML references static assets that are not in the current build. "
                      "The cPanel Node app is likely stale, not restarted, or pointed at a different application root."
                  )
                  errors.extend(f"stale asset: {path}" for path in stale_assets[:10])

              for path in asset_paths:
                  url = f"{base_url}{path}"
                  try:
                      status, content_type = request(url, "HEAD")
                  except urllib.error.HTTPError as exc:
                      errors.append(f"HEAD {url} returned {exc.code}")
                      continue
                  except Exception as exc:
                      errors.append(f"HEAD {url} failed: {exc}")
                      continue

                  if status >= 400:
                      errors.append(f"HEAD {url} returned {status}")
                  if path.endswith(".css") and "text/css" not in content_type:
                      errors.append(f"HEAD {url} returned unexpected content-type {content_type!r}")
                  if path.endswith(".js") and "javascript" not in content_type:
                      errors.append(f"HEAD {url} returned unexpected content-type {content_type!r}")

              if not errors:
                  print(f"Verified {len(asset_paths)} public Next.js static assets from {base_url}.")
                  sys.exit(0)

              print(f"Deploy smoke attempt {attempt} failed:")
              for error in errors[:20]:
                  print(f"- {error}")
              if attempt < 4:
                  time.sleep(10)

          sys.exit(1)
          PY
